<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Analyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #080b10;
      --surface: #0e1219;
      --surface2: #141a24;
      --border: #1e2a3a;
      --accent: #00d4aa;
      --accent2: #0094ff;
      --accent3: #ff6b6b;
      --text: #e8edf5;
      --muted: #5a6a80;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* Header */
    header {
      padding: 36px 0 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 40px;
    }

    .logo {
      font-family: var(--display);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .tagline {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-left: auto;
      transition: background 0.3s;
    }

    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* Two-column layout */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-family: var(--display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header span {
      color: var(--accent);
    }

    /* Upload zone */
    .upload-zone {
      margin: 20px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0, 212, 170, 0.04);
    }

    .upload-zone input {
      display: none;
    }

    .upload-icon {
      font-size: 32px;
      margin-bottom: 10px;
      display: block;
    }

    .upload-label {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 6px;
    }

    .upload-sub {
      color: var(--muted);
      font-size: 11px;
    }

    /* File info */
    .file-info {
      margin: 0 20px 20px;
      padding: 12px 16px;
      background: rgba(0, 212, 170, 0.06);
      border: 1px solid rgba(0, 212, 170, 0.2);
      border-radius: 8px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .file-info.show {
      display: flex;
    }

    .file-icon {
      color: var(--accent);
      font-size: 18px;
    }

    .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 12px;
    }

    .file-clear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      transition: color 0.2s;
    }

    .file-clear:hover {
      color: var(--accent3);
    }

    /* Suggestions */
    .suggestions {
      padding: 0 20px 20px;
    }

    .suggestions-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .suggestion-chip {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0.5;
    }

    .suggestion-chip.enabled {
      opacity: 1;
    }

    .suggestion-chip.enabled:hover {
      border-color: var(--accent2);
      background: rgba(0, 148, 255, 0.06);
      color: var(--accent2);
    }

    /* Right panel: chat */
    .chat-panel {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 180px);
      min-height: 500px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      gap: 12px;
      padding: 40px;
    }

    .empty-glyph {
      font-size: 48px;
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      opacity: 0.4;
    }

    /* Message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-role {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding-left: 2px;
    }

    .msg.user .msg-role {
      color: var(--accent2);
    }

    .msg.assistant .msg-role {
      color: var(--accent);
    }

    .msg-body {
      padding: 14px 16px;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .msg.user .msg-body {
      background: rgba(0, 148, 255, 0.08);
      border: 1px solid rgba(0, 148, 255, 0.15);
      align-self: flex-end;
      max-width: 85%;
    }

    .msg.assistant .msg-body {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .msg-charts {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 4px;
    }

    .chart-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .chart-img:hover {
      transform: scale(1.01);
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 12px 0;
    }

    .dots {
      display: flex;
      gap: 4px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0.2;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Input bar */
    .input-bar {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 44px;
      max-height: 140px;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    textarea:disabled {
      opacity: 0.5;
    }

    .send-btn {
      height: 44px;
      width: 44px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .chat-panel {
        height: 60vh;
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <header>
      <div>
        <div class="tagline">AI-Powered</div>
        <div class="logo">Data Analyst</div>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </header>

    <div class="layout">
      <!-- Left: upload + suggestions -->
      <div>
        <div class="panel">
          <div class="panel-header"><span>01</span> Data Source</div>

          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept=".csv" />
            <span class="upload-icon">⬆</span>
            <span class="upload-label">Drop CSV here</span>
            <span class="upload-sub">or click to browse</span>
          </div>

          <div class="file-info" id="fileInfo">
            <span class="file-icon">◈</span>
            <span class="file-name" id="fileName">—</span>
            <button class="file-clear" id="fileClear" title="Remove file">✕</button>
          </div>
        </div>

        <div class="panel" style="margin-top: 16px;">
          <div class="panel-header"><span>02</span> Quick Prompts</div>
          <div class="suggestions">
            <div class="suggestions-label">Upload a file to unlock</div>
            <button class="suggestion-chip"
              data-q="Give me a summary of this dataset — rows, columns, types, and key stats.">📋 Dataset
              overview</button>
            <button class="suggestion-chip" data-q="What are the top 5 insights or patterns you notice in this data?">💡
              Key insights</button>
            <button class="suggestion-chip" data-q="Show me a distribution chart for all numeric columns.">📊
              Distributions</button>
            <button class="suggestion-chip"
              data-q="Are there any missing values or data quality issues? Show me a summary.">🔍 Data quality
              check</button>
            <button class="suggestion-chip" data-q="Plot a correlation heatmap of all numeric columns.">🌡 Correlation
              heatmap</button>
            <button class="suggestion-chip"
              data-q="Show me the top 10 rows and describe what kind of data this appears to be.">🔬 Preview &
              describe</button>
          </div>
        </div>
      </div>

      <!-- Right: chat interface -->
      <div class="panel chat-panel">
        <div class="panel-header"><span>03</span> Analysis Console</div>

        <div class="messages" id="messages">
          <div class="empty-state" id="emptyState">
            <div class="empty-glyph">⬡</div>
            <div class="empty-title">Upload a CSV to begin</div>
            <div>Ask questions in natural language — the AI agent will analyze, calculate, and generate charts.</div>
          </div>
        </div>

        <div class="input-bar">
          <div class="input-wrap">
            <textarea id="questionInput" placeholder="Ask anything about your data…" disabled rows="1"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" disabled title="Send">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="Chart" />
  </div>

  <script>
    let sessionId = null;
    let isLoading = false;

    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileClear = document.getElementById('fileClear');
    const messages = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const chips = document.querySelectorAll('.suggestion-chip');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    // Upload zone
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleUpload(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleUpload(fileInput.files[0]);
    });

    fileClear.addEventListener('click', () => {
      clearSession();
    });

    async function handleUpload(file) {
      if (!file.name.endsWith('.csv')) {
        alert('Please upload a CSV file.');
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      try {
        uploadZone.style.opacity = '0.5';
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Upload failed');

        sessionId = data.session_id;
        console.log('sessionId', sessionId);
        fileName.textContent = data.filename;
        fileInfo.classList.add('show');
        uploadZone.style.display = 'none';

        // Enable UI
        questionInput.disabled = false;
        sendBtn.disabled = false;
        chips.forEach(c => c.classList.add('enabled'));
        statusDot.classList.add('active');

        addMessage('assistant', `✓ Loaded **${data.filename}**. I'm ready to analyze. Ask me anything — summaries, statistics, trends, or charts.`);
      } catch (err) {
        alert('Upload error: ' + err.message);
      } finally {
        uploadZone.style.opacity = '1';
      }
    }

    async function clearSession() {
      if (sessionId) {
        await fetch(`/session/${sessionId}`, { method: 'DELETE' }).catch(() => { });
      }
      sessionId = null;
      fileInfo.classList.remove('show');
      uploadZone.style.display = '';
      fileInput.value = '';
      questionInput.disabled = true;
      sendBtn.disabled = true;
      chips.forEach(c => c.classList.remove('enabled'));
      statusDot.classList.remove('active');
      messages.innerHTML = '';
      messages.appendChild(emptyState);
      emptyState.style.display = '';
    }

    // Suggestions
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        if (!chip.classList.contains('enabled')) return;
        questionInput.value = chip.dataset.q;
        questionInput.focus();
      });
    });

    // Send
    sendBtn.addEventListener('click', sendQuestion);
    questionInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });

    questionInput.addEventListener('input', () => {
      questionInput.style.height = 'auto';
      questionInput.style.height = Math.min(questionInput.scrollHeight, 140) + 'px';
    });

    async function sendQuestion() {
      const q = questionInput.value.trim();
      if (!q || !sessionId || isLoading) return;

      isLoading = true;
      questionInput.value = '';
      questionInput.style.height = 'auto';
      sendBtn.disabled = true;

      emptyState.style.display = 'none';
      addMessage('user', q);

      const thinkEl = addThinking();
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, question: q }),
        });
        const data = await res.json();
        thinkEl.remove();

        if (!res.ok) throw new Error(data.detail || 'Analysis failed');

        addMessage('assistant', data.answer, data.charts || []);
      } catch (err) {
        thinkEl.remove();
        addMessage('assistant', `⚠ Error: ${err.message}`);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        messages.scrollTop = messages.scrollHeight;
      }
    }

    function addMessage(role, text, charts = []) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      const roleEl = document.createElement('div');
      roleEl.className = 'msg-role';
      roleEl.textContent = role === 'user' ? '▸ You' : '◈ Analyst';
      div.appendChild(roleEl);

      const body = document.createElement('div');
      body.className = 'msg-body';
      body.textContent = text;
      div.appendChild(body);

      if (charts.length > 0) {
        const chartsDiv = document.createElement('div');
        chartsDiv.className = 'msg-charts';
        charts.forEach(b64 => {
          const img = document.createElement('img');
          img.className = 'chart-img';
          img.src = b64;//`data:image/png;base64,${b64}`;
          img.alt = 'Chart';
          img.addEventListener('click', () => openLightbox(img.src));
          chartsDiv.appendChild(img);
        });
        div.appendChild(chartsDiv);
      }

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function addThinking() {
      const div = document.createElement('div');
      div.className = 'thinking';
      div.innerHTML = `<span>Analyzing</span><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      messages.appendChild(div);
      return div;
    }

    // Lightbox
    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add('open');
    }

    lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
  </script>
</body>

</html>
